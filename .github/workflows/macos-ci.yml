name: macos-ci

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  hosted:
    # backup/uya-hosted.c 目前仍是 x86_64 hosted seed；macos-latest 已切到 arm64 runner，
    # 会在 from-c 阶段因为种子内的 x86_64 inline asm/clobber（rax/rdi/...）直接失败。
    # 先固定到 Intel runner，后续等 arm64 hosted seed 独立落地后再恢复 matrix/arm64。
    runs-on: macos-15-intel
    env:
      UYA_ROOT: ${{ github.workspace }}/lib/

    steps:
    - uses: actions/checkout@v4

    - name: Prepare hosted seed for macOS
      run: |
        rm -rf bin
        mkdir -p bin

    - name: Bootstrap seed compiler from hosted backup
      run: make from-c

    - name: Build hosted compiler
      run: make uya-hosted

    - name: Verify hosted self-host
      run: make b-hosted

    - name: Run hosted test profile
      env:
        TEST_PROFILE: hosted
        SKIP_DARWIN_DEFAULT: "1"
      run: make tests-hosted
