name: macos-ci

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  hosted:
    # from-c 现在会优先选择 backup/uya-hosted-<host_os>-<host_arch>.c，
    # CI 固定使用 Intel x86_64 runner，避免 macos-latest 漂移到 arm64 后切到另一套 seed。
    runs-on: macos-13
    env:
      HOST_OS: macos
      HOST_ARCH: x86_64
      TARGET_OS: macos
      TARGET_ARCH: x86_64
      UYA_ROOT: ${{ github.workspace }}/lib/

    steps:
    - uses: actions/checkout@v4

    - name: Prepare hosted seed for macOS
      run: |
        rm -rf bin
        mkdir -p bin

    - name: Bootstrap seed compiler from hosted backup
      run: make from-c

    - name: Build hosted compiler
      run: make uya-hosted

    - name: Verify hosted self-host
      run: make b-hosted

    - name: Run hosted test profile
      env:
        TEST_PROFILE: hosted
        SKIP_DARWIN_DEFAULT: "1"
      run: make tests-hosted
