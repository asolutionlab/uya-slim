name: macos-ci

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  hosted:
    # from-c 会优先选择 backup/uya-hosted-<host_os>-<host_arch>.c；
    # hosted 主线固定走 Apple Silicon，稳定验证 macOS arm64 seeds。
    runs-on: macos-15
    env:
      HOST_OS: macos
      HOST_ARCH: arm64
      TARGET_OS: macos
      TARGET_ARCH: arm64
      UYA_ROOT: ${{ github.workspace }}/lib/

    steps:
    - uses: actions/checkout@v4

    - name: Prepare hosted seed for macOS
      run: |
        rm -rf bin
        mkdir -p bin

    - name: Bootstrap seed compiler from hosted backup
      run: make from-c

    - name: Build hosted compiler
      run: make uya-hosted

    - name: Verify hosted self-host
      run: make b-hosted

    - name: Run hosted test profile
      env:
        TEST_PROFILE: hosted
        SKIP_DARWIN_DEFAULT: "1"
      run: make tests-hosted

    - name: Run microapp hosted smoke
      run: make microapp-hosted-smoke

    - name: Run microapp aarch64 hosted runtime
      run: make microapp-aarch64-runtime-check
